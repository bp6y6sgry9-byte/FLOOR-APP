<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Floor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{
  color-scheme:dark;
  --paper:#141416; --paper2:#222326; --ink:#E8E5DE; --ash:#77787D;
  --mark:#57A97B; --miss:#C4574A;
  --display:'Oswald',system-ui,sans-serif;
  --body:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased}
#app{max-width:460px;margin:0 auto;padding:40px 20px 80px}
button{background:none;border:none;font:inherit;color:inherit;cursor:pointer}
button:focus-visible,input:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
input{background:none;border:none;outline:none;color:var(--ink);width:100%}

.head{display:flex;align-items:flex-end;justify-content:space-between}
.daynum{font-family:var(--display);font-weight:700;font-size:74px;line-height:.85;letter-spacing:-.02em}
.daytot{font-family:var(--display);font-weight:300;font-size:24px;color:var(--ash);margin-left:10px}
.stamp{font-family:var(--mono);font-size:11px;color:var(--ash);letter-spacing:.08em;text-align:right;line-height:1.6}
.stamp .busted{color:var(--miss)}
.rule-hr{height:1px;background:var(--ink);opacity:.22;margin:18px 0 20px}

nav{display:flex;gap:20px;margin-bottom:26px}
nav button{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);padding-bottom:4px;border-bottom:2px solid transparent}
nav button.on{color:var(--ink);border-bottom-color:var(--ink)}

.row{border-bottom:1px solid var(--paper2)}
.row-top{display:flex;align-items:center;justify-content:space-between;padding:16px 4px}
.row-label{flex:1;text-align:left;padding-right:12px;font-size:17px;font-weight:500}
.row-label .plus{font-family:var(--mono);font-size:11px;color:var(--ash);margin-left:8px}
.row.done .row-label span:first-child{color:var(--ash);text-decoration:line-through;text-decoration-thickness:1px}
.box{width:30px;height:30px;flex:0 0 30px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--paper2)}
.row.done .box{border-color:var(--mark)}
.detail{padding:0 4px 16px}
.detail p{font-size:14px;color:var(--ash);line-height:1.55}
.more{font-size:14px;color:var(--ink);line-height:1.55;margin-top:8px}
.feeds{font-family:var(--mono);font-size:10px;letter-spacing:.08em;margin-top:8px;line-height:1.5;color:var(--ash)}

.field-label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ash);display:block}
.note-input{margin-top:8px;padding:12px 0;border-bottom:1.5px solid var(--ink);font-size:16px}
.tally{font-family:var(--mono);font-size:12px;color:var(--ash);letter-spacing:.06em;margin-top:22px}
.tally.clean{color:var(--mark)}
.warn{font-family:var(--mono);font-size:11px;color:var(--miss);letter-spacing:.06em;margin-bottom:16px;line-height:1.6}

.goal{padding-bottom:22px;margin-bottom:22px;border-bottom:1px solid var(--paper2)}
.goal h3{font-family:var(--display);font-weight:500;font-size:21px;letter-spacing:.02em}
.goal p.why{font-size:14px;color:var(--ash);margin-top:6px;line-height:1.55}
.bignum{display:flex;align-items:baseline;gap:10px;margin-top:14px}
.bignum b{font-family:var(--display);font-weight:700;font-size:32px;line-height:1}
.bignum span{font-family:var(--mono);font-size:10px;color:var(--ash);letter-spacing:.08em;line-height:1.4}
.metric{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-top:14px}
.metric input{padding:6px 0;border-bottom:1px solid var(--paper2);font-family:var(--display);font-weight:500;font-size:23px}
.hint{font-size:12px;color:var(--ash);margin-top:5px;line-height:1.4}
.driven{font-family:var(--mono);font-size:10px;color:var(--ash);letter-spacing:.07em;margin-top:14px;line-height:1.5}

.board{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;background:var(--paper2);border:1px solid var(--paper2)}
.cell.future{background:none;opacity:.45}
.cell.today{border:1.5px solid var(--ink)}
.cell i{position:absolute;bottom:2px;right:4px;font-family:var(--mono);font-style:normal;font-size:9px;color:var(--ash)}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-top:18px;font-family:var(--mono);font-size:11px;color:var(--ash);letter-spacing:.06em}
.stats .bad{color:var(--miss)}
.peek{margin-top:24px;padding-top:16px;border-top:1px solid var(--paper2)}
.peek .when{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ash)}
.peek .note{font-size:17px;margin-top:10px}
.peek .chk{font-size:14px;padding:2px 0;color:var(--ash)}
.peek .chk.y{color:var(--mark)}
.logtitle{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ash);margin:36px 0 12px}
.logrow{display:flex;gap:14px;padding:7px 0;border-bottom:1px solid var(--paper2)}
.logrow b{font-family:var(--mono);font-size:12px;color:var(--ash);font-weight:400;flex:0 0 26px}
.logrow span{font-size:15px}
.empty{font-size:15px;color:var(--ash);line-height:1.5}

h1{font-family:var(--display);font-weight:700;font-size:44px;line-height:1}
.intro{font-size:16px;color:var(--ash);margin:10px 0 26px;line-height:1.55}
.setup-rule{padding:12px 0;border-bottom:1px solid var(--paper2)}
.setup-rule b{font-family:var(--display);font-weight:500;font-size:17px;letter-spacing:.02em;display:block}
.setup-rule span{font-size:13px;color:var(--ash);line-height:1.5;display:block;margin-top:3px}
.grace{display:flex;gap:8px;margin-bottom:32px}
.grace button{padding:9px 14px;font-family:var(--mono);font-size:12px;letter-spacing:.05em;color:var(--ash);border:1px solid var(--paper2)}
.grace button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.start{width:100%;padding:18px;background:var(--ink);color:var(--paper);font-family:var(--display);font-weight:500;font-size:18px;letter-spacing:.14em}
.foot{font-family:var(--mono);font-size:11px;color:var(--ash);margin-top:12px;text-align:center;letter-spacing:.04em;line-height:1.7}
.reset{display:block;margin:48px auto 0;font-family:var(--mono);font-size:10px;color:var(--ash);letter-spacing:.1em}
@media(prefers-reduced-motion:no-preference){.cell svg,.box svg{animation:in .18s ease-out}@keyframes in{from{opacity:0;transform:scale(.6)}}}
</style>

<div id="app"></div>

<script>
const NAME = "THE FLOOR";           // <- change the name here
const TOTAL = 30, KEY = "floor:v1";

/* Uses window.storage inside Claude, localStorage when you open the file yourself. */
const store = {
  async get(){
    try { if (window.storage){ const r = await window.storage.get(KEY); return r ? JSON.parse(r.value) : null; } } catch(e){ return null; }
    const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null;
  },
  async set(v){
    const s = JSON.stringify(v);
    try { if (window.storage){ await window.storage.set(KEY, s); return; } } catch(e){}
    localStorage.setItem(KEY, s);
  },
  async clear(){
    try { if (window.storage){ await window.storage.delete(KEY); return; } } catch(e){}
    localStorage.removeItem(KEY);
  }
};

const GOALS = [
  { id:"speak", title:"Become articulate",
    why:"You get articulate by talking and by reading. One minute of talking, one page of reading. Every day. That's it.",
    metric:"Filler words per take", hint:"Count the ums in one take. Lower is the win.", lower:true },
  { id:"sell", title:"Become a great salesman",
    why:"Selling isn't charisma. It's volume, plus what you do after the no. One ask a day is 22 asks a month.",
    metric:"Conversations this week", hint:"Real asks that got a real answer. Not impressions." },
  { id:"audience", title:"10k on IG / TikTok",
    why:"You control videos posted. You don't control followers. 30 videos is the goal; 10k is the weather.",
    metric:"Followers", hint:"Weekly. Not daily. Daily will make you insane." },
  { id:"cpt", title:"Finish the CPT",
    why:"One week, not thirty. Pass it, then that slot becomes an ask.",
    metric:"Chapters done", hint:"Kill this by day 8." },
];

/* The floor is what you do on your worst day. Never raise it. */
const RULES = [
  { id:"read", label:"Read one page", from:1, to:30, goals:["speak"],
    detail:"One page. Not one chapter. Non-fiction, physical book, next to the bed.",
    more:"You'll usually read more. That's fine \u2014 but one page still counts as a clean day, and that's the point. The floor exists for the night you get home at midnight." },
  { id:"talk", label:"Talk for one minute", from:1, to:30, goals:["speak","sell","cpt"],
    detail:"Hit record. Explain one idea out loud for 60 seconds. Unscripted, one take, no re-record. Nobody ever sees it.",
    more:"Keep every file, numbered. On day 30 you play day 1 back \u2014 that recording is the only proof you'll ever have that this worked." },
  { id:"post", label:"Post one video", from:1, to:30, goals:["audience"],
    detail:"Any format. Drills, b-roll, an edit, text on screen. No face required. Posted, not drafted.",
    more:"A bad video posted beats a good video saved. The floor is that it goes live." },
  { id:"cptstudy", label:"CPT \u2014 one section", from:1, to:8, goals:["cpt"],
    detail:"One section. Sit down and open it.",
    more:"This rule expires after day 8 whether you're finished or not. Then it becomes One ask." },
  { id:"ask", label:"One ask", from:9, to:30, goals:["sell","audience"],
    detail:"One real attempt at one human who can say no. A DM, a call, a pitch, an offer.",
    more:"One. Not five. You will often send more once you've sent the first \u2014 that's the whole mechanic." },
  { id:"client", label:"Client work \u2014 5 minutes", from:1, to:30, goals:["sell"],
    detail:"Open it. Five minutes. Reply to one thing, fix one thing, or just look at where it stands.",
    more:"Five minutes is enough to stop it rotting, and it's short enough that you can't talk yourself out of it. Most days you'll stay longer once you're in \u2014 that's the mechanic, not a bonus." },
  { id:"log", label:"One line in the log", from:1, to:30, goals:[],
    detail:"How you feel. Ten seconds. Ten words.",
    more:"This is the one you'll be gladdest you kept. In thirty days it's the only record of what actually happened." },
];

const iso = d => d.toISOString().slice(0,10);
const today = () => iso(new Date());
const addDays = (s,n) => { const d = new Date(s+"T00:00:00"); d.setDate(d.getDate()+n); return iso(d); };
const dayIndex = (start,d) => Math.round((new Date(d+"T00:00:00") - new Date(start+"T00:00:00"))/864e5);
const pretty = s => new Date(s+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
const active = n => RULES.filter(r => n >= r.from && n <= r.to);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const slash = (size,color,w) => `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" aria-hidden="true">
  <line x1="${size*.22}" y1="${size*.22}" x2="${size*.78}" y2="${size*.78}" stroke="${color}" stroke-width="${w}" stroke-linecap="round"/>
  <line x1="${size*.78}" y1="${size*.22}" x2="${size*.22}" y2="${size*.78}" stroke="${color}" stroke-width="${w}" stroke-linecap="round"/></svg>`;
const X = slash(20,"var(--mark)",2.4);

let S = null, tab = "today", open = null, peek = null;
const app = document.getElementById("app");
const save = async () => { await store.set(S); render(); };

function status(i, idx){
  const r = S.days[addDays(S.start,i)];
  if (i > idx) return "future";
  if (!r) return i === idx ? "open" : "missed";
  return active(i+1).every(x => r.checks[x.id]) ? "clean" : (i === idx ? "open" : "missed");
}

function spark(entries, lower){
  const v = entries.map(e => Number(e.v)).filter(x => !isNaN(x));
  if (v.length < 2) return "";
  const w=110,h=28,min=Math.min(...v),max=Math.max(...v),span=(max-min)||1;
  const pts = v.map((x,i)=>`${(i/(v.length-1))*w},${h-((x-min)/span)*h}`).join(" ");
  const better = lower ? v[v.length-1] < v[0] : v[v.length-1] > v[0];
  return `<svg width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${better?"var(--mark)":"var(--ash)"}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

function render(){
  if (!S) return renderSetup();

  const idx = dayIndex(S.start, today());
  const n = Math.min(Math.max(idx+1,1), TOTAL);
  const over = idx >= TOTAL;
  const rec = S.days[today()] || { checks:{}, note:"" };
  const rules = active(n);

  let clean=0, missed=0;
  for (let i=0;i<TOTAL;i++){ const s=status(i,idx); if(s==="clean")clean++; if(s==="missed")missed++; }
  const graceLeft = Math.max(S.grace - missed, 0);
  const busted = missed > S.grace;
  const count = id => Object.values(S.days).filter(d=>d.checks[id]).length;
  const posted = count("post"), talks = count("talk"), pages = count("read");

  let body = "";

  if (tab === "today"){
    if (n===8 && !over) body += `<p class="warn">LAST CPT DAY. TOMORROW THAT SLOT BECOMES ONE ASK.</p>`;
    if (over) body += `<p style="font-size:16px;margin-bottom:22px;line-height:1.55">Thirty days. ${clean} clean. ${posted} videos, ${talks} takes, ${pages} pages. Play day 1's take, then read the log. That's the payoff \u2014 take it.</p>`;

    body += rules.map(r => {
      const on = !!rec.checks[r.id], o = open === r.id;
      return `<div class="row ${on?"done":""}">
        <div class="row-top">
          <button class="row-label" data-open="${r.id}"><span>${r.label}</span><span class="plus">${o?"\u2212":"+"}</span></button>
          <button class="box" data-toggle="${r.id}" aria-label="${esc(r.label)}" aria-pressed="${on}">${on?X:""}</button>
        </div>
        ${o?`<div class="detail">
          <p>${r.detail}</p>
          <p class="more">${r.more}</p>
          ${r.goals.length?`<p class="feeds">FEEDS: ${r.goals.map(g=>GOALS.find(x=>x.id===g).title).join(" \u00b7 ").toUpperCase()}</p>`:""}
        </div>`:""}
      </div>`;
    }).join("");

    body += `<div style="margin-top:32px">
      <label class="field-label" for="note">ONE LINE</label>
      <input id="note" class="note-input" value="${esc(rec.note)}" placeholder="How you feel. Ten words.">
    </div>
    <p class="tally ${rules.every(r=>rec.checks[r.id])?"clean":""}">${
      rules.every(r=>rec.checks[r.id]) ? "FLOOR CLEARED." : `${rules.filter(r=>rec.checks[r.id]).length} OF ${rules.length}`
    }</p>`;
  }

  if (tab === "goals"){
    body += `<p style="font-size:15px;color:var(--ash);margin-bottom:26px;line-height:1.55">You never check these off \u2014 you check off the habits. These are the scoreboard. Update them on Sunday, then close the tab.</p>`;
    body += GOALS.map(g => {
      const entries = (S.metrics[g.id]||[]).slice().sort((a,b)=>a.d.localeCompare(b.d));
      const last = entries[entries.length-1];
      const feeders = RULES.filter(r => r.goals.includes(g.id) && n <= r.to);
      let big = "";
      if (g.id==="audience") big = `<div class="bignum"><b>${posted}</b><span>VIDEOS POSTED \u2014<br>THE ONLY PART YOU CONTROL</span></div>`;
      if (g.id==="speak")    big = `<div class="bignum"><b>${talks}</b><span>TAKES RECORDED \u2014<br>KEEP EVERY FILE</span></div>`;
      return `<div class="goal">
        <h3>${g.title.toUpperCase()}</h3>
        <p class="why">${g.why}</p>
        ${big}
        <div class="metric">
          <div style="flex:1">
            <label class="field-label" for="m-${g.id}">${g.metric.toUpperCase()}</label>
            <input id="m-${g.id}" data-metric="${g.id}" value="${last?esc(last.v):""}" placeholder="\u2014">
            <p class="hint">${g.hint}</p>
          </div>
          ${spark(entries, g.lower)}
        </div>
        ${feeders.length?`<p class="driven">DRIVEN BY: ${feeders.map(f=>f.label).join(" \u00b7 ").toUpperCase()}</p>`:""}
      </div>`;
    }).join("");
  }

  if (tab === "board"){
    let cells = "";
    for (let i=0;i<TOTAL;i++){
      const s = status(i, idx);
      cells += `<button class="cell ${s} ${i===idx?"today":""}" data-peek="${i}" title="${pretty(addDays(S.start,i))}">
        ${s==="clean"?slash(26,"var(--mark)",2.4):s==="missed"?slash(26,"var(--miss)",1.2):""}<i>${i+1}</i></button>`;
    }
    body += `<div class="board">${cells}</div>
      <div class="stats"><span>${clean} CLEAN</span><span class="${missed?"bad":""}">${missed} MISSED</span><span>${posted} POSTED</span><span>${talks} TAKES</span></div>`;

    if (peek !== null){
      const d = addDays(S.start, peek), r = S.days[d];
      body += `<div class="peek"><div class="when">DAY ${String(peek+1).padStart(2,"0")} \u2014 ${pretty(d).toUpperCase()}</div>`;
      body += r
        ? `<p class="note">${r.note ? esc(r.note) : `<span style="color:var(--ash)">No line.</span>`}</p>
           <div style="margin-top:10px">${active(peek+1).map(x=>`<div class="chk ${r.checks[x.id]?"y":""}">${r.checks[x.id]?"\u00d7":"\u00b7"}&nbsp;&nbsp;${x.label}</div>`).join("")}</div>`
        : `<p class="note" style="color:var(--ash)">${peek>idx?"Not yet.":"Nothing logged."}</p>`;
      body += `</div>`;
    }

    const notes = Object.keys(S.days).filter(d=>S.days[d].note).sort().reverse();
    body += `<div class="logtitle">THE LOG</div>`;
    body += notes.length
      ? notes.map(d=>`<div class="logrow"><b>${String(dayIndex(S.start,d)+1).padStart(2,"0")}</b><span>${esc(S.days[d].note)}</span></div>`).join("")
      : `<p class="empty">Write a line today. In thirty days this column is the whole point.</p>`;
  }

  app.innerHTML = `
    <div class="head">
      <div style="display:flex;align-items:baseline">
        <span class="daynum">${over?TOTAL:String(n).padStart(2,"0")}</span><span class="daytot">/ ${TOTAL}</span>
      </div>
      <div class="stamp">
        <div>${pretty(today()).toUpperCase()}</div>
        <div class="${busted?"busted":""}">${busted?"GRACE SPENT":`${graceLeft} GRACE LEFT`}</div>
      </div>
    </div>
    <div class="rule-hr"></div>
    <nav>
      <button data-tab="today" class="${tab==="today"?"on":""}">Today</button>
      <button data-tab="goals" class="${tab==="goals"?"on":""}">Goals</button>
      <button data-tab="board" class="${tab==="board"?"on":""}">The board</button>
    </nav>
    ${body}
    <button class="reset" data-reset>START OVER</button>`;
  wire();
}

function renderSetup(){
  let grace = 3;
  const draw = () => {
    app.innerHTML = `
      <h1>${NAME}</h1>
      <p class="intro">The floor is what you do on your worst day. It is deliberately, almost insultingly small \u2014 so that on the night you get in at midnight, there is no excuse available to you. You'll usually do more. But more is a bonus, not the deal.</p>
      ${RULES.filter(r=>r.from===1).map(r=>`<div class="setup-rule"><b>${r.label.toUpperCase()}</b><span>${r.detail}</span></div>`).join("")}
      <div class="field-label" style="margin:26px 0 10px">WHEN YOU MISS A DAY</div>
      <div class="grace">
        ${[[3,"3 grace days"],[1,"1 grace day"],[0,"No mercy"]].map(([v,l])=>
          `<button data-grace="${v}" class="${grace===v?"on":""}">${l}</button>`).join("")}
      </div>
      <button class="start" data-start>START DAY 01</button>
      <p class="foot">Missing one day doesn't break a habit. Missing two in a row does.<br>That's what the grace days are for.</p>`;
    app.querySelectorAll("[data-grace]").forEach(b => b.onclick = () => { grace = +b.dataset.grace; draw(); });
    app.querySelector("[data-start]").onclick = () => { S = { start: today(), grace, days:{}, metrics:{} }; save(); };
  };
  draw();
}

function wire(){
  app.querySelectorAll("[data-tab]").forEach(b => b.onclick = () => { tab = b.dataset.tab; peek = null; render(); });
  app.querySelectorAll("[data-open]").forEach(b => b.onclick = () => { open = open === b.dataset.open ? null : b.dataset.open; render(); });
  app.querySelectorAll("[data-peek]").forEach(b => b.onclick = () => { const i = +b.dataset.peek; peek = peek === i ? null : i; render(); });

  app.querySelectorAll("[data-toggle]").forEach(b => b.onclick = () => {
    const d = today(), cur = S.days[d] || { checks:{}, note:"" };
    cur.checks[b.dataset.toggle] = !cur.checks[b.dataset.toggle];
    S.days[d] = cur; save();
  });

  const note = app.querySelector("#note");
  if (note){
    note.onblur = () => {
      const d = today(), cur = S.days[d] || { checks:{}, note:"" };
      cur.note = note.value; S.days[d] = cur; store.set(S);
    };
    note.onkeydown = e => { if (e.key === "Enter") note.blur(); };
  }

  app.querySelectorAll("[data-metric]").forEach(i => i.onblur = () => {
    const v = i.value.trim(); if (!v) return;
    const id = i.dataset.metric;
    S.metrics[id] = [...(S.metrics[id]||[]).filter(e => e.d !== today()), { d: today(), v }];
    save();
  });

  app.querySelector("[data-reset]").onclick = async () => {
    if (!confirm("Wipe all thirty days and start again? This can't be undone.")) return;
    await store.clear(); S = null; tab = "today"; render();
  };
}

(async () => { S = await store.get(); render(); })();
</script>
